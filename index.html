<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jasper 數學模擬試卷 V10.1 (除法直式整合版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f9ff; user-select: none; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .digit-input { width: 100%; height: 100%; text-align: center; font-family: 'Roboto Mono', monospace; font-weight: 700; font-size: 1.5rem; border: 2px solid #cbd5e1; border-radius: 0.5rem; background-color: white; color: #1e293b; transition: all 0.2s; }
        .digit-input:focus { border-color: #6366f1; outline: none; background-color: #eef2ff; transform: scale(1.05); z-index: 10; }
        .digit-input:disabled { background-color: #f8fafc; border-color: #e2e8f0; color: #94a3b8; }
        
        .carry-input { width: 100%; height: 30px; text-align: center; font-size: 0.9rem; font-weight: bold; color: #ef4444; background-color: transparent; border: 1px dashed #fda4af; border-radius: 4px; z-index: 5; margin-bottom: 2px; }
        .calc-line { height: 4px; background-color: #334155; border-radius: 2px; margin-top: 2px; margin-bottom: 4px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .op-select { appearance: none; text-align: center; cursor: pointer; outline: none; transition: all 0.2s; }
        .op-select:hover { transform: scale(1.05); }

        @keyframes slideDownFade { 0% { transform: translate(-50%, -100%); opacity: 0; } 15% { transform: translate(-50%, 0); opacity: 1; } 80% { transform: translate(-50%, 0); opacity: 1; } 100% { transform: translate(-50%, -100%); opacity: 0; } }
        .toast-anim { animation: slideDownFade 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = {
            Clock: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Check: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
            Brain: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
            Idea: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
            FastForward: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg>
        };

        const PRAISE_WORDS = ["太棒了！", "Jasper 好野！", "完全正確！", "做得好！", "思路正確！"];

        // --- 視覺組件 ---
        const BeakerView = ({ capacity = 1000, level, label }) => {
            const perc = level / capacity;
            const waterY = 167 - (147 * perc);
            return (
                <div className="flex flex-col items-center mx-2 my-2">
                    <svg width="120" height="160" viewBox="0 0 140 180" className="drop-shadow-md">
                        <path d="M30 20 L30 160 A10 10 0 0 0 40 170 L110 170 A10 10 0 0 0 120 160 L120 20" fill="white" stroke="#334155" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round"/>
                        {perc > 0 && <path d={`M33 ${waterY} L33 160 A7 7 0 0 0 40 167 L110 167 A7 7 0 0 0 117 160 L117 ${waterY} Z`} fill="#60a5fa" opacity="0.8" />}
                        {perc > 0 && <line x1="33" y1={waterY} x2="117" y2={waterY} stroke="#2563eb" strokeWidth="3" />}
                        <line x1="90" y1="130.25" x2="120" y2="130.25" stroke="#1e293b" strokeWidth="3"/>
                        <text x="85" y="135" fontSize="16" fontWeight="bold" textAnchor="end" fill="#475569">{capacity * 0.25}</text>
                        <line x1="90" y1="93.5" x2="120" y2="93.5" stroke="#1e293b" strokeWidth="3"/>
                        <text x="85" y="98" fontSize="16" fontWeight="bold" textAnchor="end" fill="#475569">{capacity * 0.5}</text>
                        <line x1="90" y1="56.75" x2="120" y2="56.75" stroke="#1e293b" strokeWidth="3"/>
                        <text x="85" y="61" fontSize="16" fontWeight="bold" textAnchor="end" fill="#475569">{capacity * 0.75}</text>
                        <line x1="90" y1="20" x2="120" y2="20" stroke="#1e293b" strokeWidth="3"/>
                        {capacity < 2000 && <text x="85" y="25" fontSize="16" fontWeight="bold" textAnchor="end" fill="#475569">{capacity}</text>}
                    </svg>
                    <div className="mt-2 font-black text-slate-700 bg-white px-3 py-1 rounded-lg shadow-sm text-sm border-2 border-slate-200 text-center">{label}<br/><span className="text-xs text-slate-500">容量: {capacity >= 1000 ? capacity/1000+'L' : capacity+'mL'}</span></div>
                </div>
            );
        };

        const ThreeBeakersView = ({ labels }) => {
            if (!labels || labels.length < 3) return null; 
            return (
                <div className="flex justify-center items-end gap-2 my-6 bg-slate-50 p-4 rounded-xl border border-slate-200 overflow-x-auto">
                    <BeakerView capacity={labels[0].c} level={labels[0].l} label={labels[0].n} />
                    <BeakerView capacity={labels[1].c} level={labels[1].l} label={labels[1].n} />
                    <BeakerView capacity={labels[2].c} level={labels[2].l} label={labels[2].n} />
                </div>
            );
        };

        const CapacitySubView = ({ subLogic }) => {
            const Pot = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="#fcd34d" stroke="#b45309" strokeWidth="2"><path d="M4 10h16v8a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-8z"/><path d="M2 10h20"/><path d="M6 6h12v4H6z"/></svg>;
            const Bottle = () => <svg width="20" height="40" viewBox="0 0 24 24" fill="#bae6fd" stroke="#1e3a8a" strokeWidth="2"><rect x="6" y="8" width="12" height="14" rx="2"/><path d="M9 8V4h6v4"/><rect x="8" y="2" width="8" height="2" rx="1"/></svg>;
            const Cup = () => <svg width="30" height="30" viewBox="0 0 24 24" fill="#e2e8f0" stroke="#334155" strokeWidth="2"><path d="M6 4h12v10a6 6 0 0 1-6 6 6 6 0 0 1-6-6V4z"/><path d="M18 7h2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2h-2"/></svg>;
            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-6 my-4">
                    <div className="flex items-center justify-center gap-4">
                        <div className="flex items-center gap-1 bg-amber-50 px-2 py-1 rounded"><Pot /></div>
                        <div className="font-black text-2xl text-slate-400">=</div>
                        <div className="flex items-center gap-1 bg-blue-50 px-2 py-1 rounded">{[...Array(subLogic)].map((_,i)=><Bottle key={`b1-${i}`}/>)}</div>
                        <div className="font-black text-2xl text-slate-400">+</div>
                        <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded">{[...Array(subLogic)].map((_,i)=><Cup key={`c1-${i}`}/>)}</div>
                    </div>
                    <div className="flex items-center justify-center gap-4">
                        <div className="flex items-center gap-1 font-black text-lg bg-indigo-100 text-indigo-800 px-3 py-2 rounded">1 個水壺</div>
                        <div className="font-black text-2xl text-slate-400">=</div>
                        <div className="flex items-center gap-1 bg-blue-50 px-2 py-1 rounded"><Bottle /></div>
                        <div className="font-black text-2xl text-slate-400">+</div>
                        <div className="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded"><Cup /></div>
                    </div>
                </div>
            );
        };

        const AbacusView = ({ number }) => {
            const digits = number.toString().padStart(5, '0').split('');
            const places = ['萬', '千', '百', '十', '個'];
            return (
                <div className="flex justify-center gap-3 my-6 bg-amber-50 p-6 rounded-2xl border-2 border-amber-200 shadow-sm">
                    {digits.map((d, i) => (
                        <div key={i} className="flex flex-col items-center">
                            <div className="h-32 w-1 bg-slate-400 relative mb-2">
                                {[...Array(parseInt(d))].map((_, j) => (
                                    <div key={j} className="absolute w-8 h-5 bg-amber-600 rounded-full left-1/2 transform -translate-x-1/2 border border-amber-800 shadow-sm z-10" style={{bottom: j * 20}}></div>
                                ))}
                            </div>
                            <div className="w-10 h-10 flex items-center justify-center border-2 border-slate-600 bg-white font-bold text-slate-700 rounded-lg shadow-sm text-lg">{places[i]}</div>
                        </div>
                    ))}
                </div>
            );
        };

        const PictogramView = ({ data, title }) => {
            return (
                <div className="my-6 w-full max-w-md mx-auto bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <div className="text-center font-bold text-xl mb-6 border-b-2 border-slate-100 pb-2">{title || "（標題）"}</div>
                    <div className="flex justify-end mb-4 pr-4">
                        <div className="flex items-center gap-2 bg-slate-100 px-3 py-1 rounded-full text-xs font-bold text-slate-600">
                            <div className="w-4 h-4 rounded-full bg-blue-500"></div> = 1 人
                        </div>
                    </div>
                    <div className="flex justify-around items-end h-56 border-b-2 border-slate-800 pb-2 px-2">
                        {data.map((item, i) => (
                            <div key={i} className="flex flex-col items-center gap-2 w-1/5">
                                <div className="flex flex-col-reverse gap-1 h-full justify-start">
                                    {[...Array(item.value)].map((_, j) => (
                                        <div key={j} className="w-6 h-6 rounded-full bg-blue-500 border-2 border-white shadow-sm ring-1 ring-blue-200"></div>
                                    ))}
                                </div>
                                <div className="mt-2 text-sm font-bold text-slate-700 writing-mode-vertical text-center">{item.name}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 直式組件 (加減乘除) ---
        const VerticalAddSub = ({ n1, n2, op, onComplete }) => {
            const digits1 = n1.toString().padStart(4, ' ').split('');
            const digits2 = n2.toString().padStart(4, ' ').split('');
            const [inputs, setInputs] = useState(['', '', '', '']);
            const [carries, setCarries] = useState(['', '', '', '']);
            const [userOp, setUserOp] = useState('?');
            const [errorMsg, setErrorMsg] = useState('');
            const correctAns = op === '+' ? n1 + n2 : n1 - n2;
            const correctDigits = correctAns.toString().padStart(4, ' ').split('');

            const checkAnswer = () => {
                if (userOp !== op) { setErrorMsg(`請選擇正確的計算符號！(應該是 ${op} 喔)`); return; }
                let userNumStr = inputs.map(d => d === '' ? ' ' : d).join('');
                if (parseInt(userNumStr.replace(/\s/g, '')) === correctAns) onComplete(correctAns);
                else setErrorMsg('答案有錯喔！請重新檢查你的計算。');
            };

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm max-w-sm mx-auto animate-in zoom-in-95">
                    <div className="grid grid-cols-5 gap-1 font-mono">
                        <div className="col-span-1"></div>{digits1.map((d, i) => <div key={`d1-${i}`} className="h-10 flex items-center justify-center text-3xl font-black text-slate-700">{d}</div>)}
                        <select value={userOp} onChange={e=>{setUserOp(e.target.value); setErrorMsg('');}} className="op-select col-span-1 text-3xl font-black text-blue-600 bg-blue-50 border-2 border-blue-200 rounded-lg outline-none">
                            <option value="?">?</option><option value="+">+</option><option value="-">-</option><option value="×">×</option>
                        </select>
                        {digits2.map((d, i) => <div key={`d2-${i}`} className="h-10 flex items-center justify-center text-3xl font-black text-slate-700">{d}</div>)}
                        <div className="col-span-1"></div>{carries.map((v, i) => (<div key={`c-${i}`} className="flex items-end justify-center"><input className="carry-input" value={v} placeholder="." onChange={e=>setCarries(p=>{const n=[...p];n[i]=e.target.value.slice(-2);return n;})} /></div>))}
                        <div className="col-span-5 calc-line"></div>
                        <div className="col-span-1"></div>{inputs.map((v, i) => (<input key={`in-${i}`} type="number" className="digit-input h-14" value={v} disabled={correctDigits[i]===' '} onChange={e => {setInputs(p=>{const n=[...p];n[i]=e.target.value.slice(-1);return n;}); setErrorMsg('');}} />))}
                    </div>
                    {errorMsg && <div className="mt-3 text-center text-rose-500 font-bold text-sm bg-rose-50 p-2 rounded">{errorMsg}</div>}
                    <button onClick={checkAnswer} className="mt-5 w-full bg-indigo-600 text-white py-3 rounded-xl font-black shadow-md active:scale-95 transition-all hover:bg-indigo-700">檢查答案</button>
                </div>
            );
        };

        const VerticalContinuous = ({ n1, n2, n3, op1, op2, onComplete }) => {
            const digits1 = n1.toString().padStart(4, ' ').split('');
            const digits2 = n2.toString().padStart(4, ' ').split('');
            const digits3 = n3.toString().padStart(4, ' ').split('');
            const step1Ans = op1 === '+' ? n1 + n2 : n1 - n2;
            const digitsStep1 = step1Ans.toString().padStart(4, ' ').split('');
            const finalAns = op2 === '+' ? step1Ans + n3 : step1Ans - n3;
            const digitsFinal = finalAns.toString().padStart(4, ' ').split('');

            const [inputs1, setInputs1] = useState(['', '', '', '']); const [carries1, setCarries1] = useState(['', '', '', '']);
            const [inputs2, setInputs2] = useState(['', '', '', '']); const [carries2, setCarries2] = useState(['', '', '', '']);
            const [userOp1, setUserOp1] = useState('?'); const [userOp2, setUserOp2] = useState('?');
            const [errorMsg, setErrorMsg] = useState('');

            const checkAnswer = () => {
                if (userOp1 !== op1) { setErrorMsg('第一個計算符號選錯了！'); return; }
                if (userOp2 !== op2) { setErrorMsg('第二個計算符號選錯了！'); return; }
                let u1 = parseInt(inputs1.map(d => d===''?' ':d).join('').replace(/\s/g, ''));
                let u2 = parseInt(inputs2.map(d => d===''?' ':d).join('').replace(/\s/g, ''));
                if (u1 !== step1Ans) { setErrorMsg('第一步算錯了，請重新檢查。'); return; }
                if (u2 !== finalAns) { setErrorMsg('最後答案算錯了，請重新檢查。'); return; }
                onComplete(finalAns);
            };

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm max-w-sm mx-auto animate-in zoom-in-95">
                    <div className="grid grid-cols-5 gap-1 font-mono items-center">
                        <div className="col-span-1"></div>{digits1.map((d, i) => <div key={`d1-${i}`} className="h-8 flex items-center justify-center text-2xl font-black text-slate-700">{d}</div>)}
                        <select value={userOp1} onChange={e=>{setUserOp1(e.target.value); setErrorMsg('');}} className="op-select col-span-1 text-2xl font-black text-blue-600 bg-blue-50 border-2 border-blue-200 rounded-lg outline-none">
                            <option value="?">?</option><option value="+">+</option><option value="-">-</option>
                        </select>
                        {digits2.map((d, i) => <div key={`d2-${i}`} className="h-8 flex items-center justify-center text-2xl font-black text-slate-700">{d}</div>)}
                        <div className="col-span-1"></div>{carries1.map((v, i) => <div key={`c1-${i}`} className="flex items-end justify-center"><input className="carry-input" value={v} placeholder="." onChange={e=>setCarries1(p=>{const n=[...p];n[i]=e.target.value.slice(-2);return n;})} /></div>)}
                        <div className="col-span-5 calc-line"></div>
                        <div className="col-span-1"></div>{inputs1.map((v, i) => <input key={`in1-${i}`} type="number" className="digit-input h-10" value={v} disabled={digitsStep1[i]===' '} onChange={e => {setInputs1(p=>{const n=[...p];n[i]=e.target.value.slice(-1);return n;}); setErrorMsg('');}} />)}
                        <select value={userOp2} onChange={e=>{setUserOp2(e.target.value); setErrorMsg('');}} className="op-select col-span-1 text-2xl font-black text-blue-600 bg-blue-50 border-2 border-blue-200 rounded-lg mt-2 outline-none">
                            <option value="?">?</option><option value="+">+</option><option value="-">-</option>
                        </select>
                        {digits3.map((d, i) => <div key={`d3-${i}`} className="h-8 flex items-center justify-center text-2xl font-black text-slate-700 mt-2">{d}</div>)}
                        <div className="col-span-1"></div>{carries2.map((v, i) => <div key={`c2-${i}`} className="flex items-end justify-center mt-1"><input className="carry-input" value={v} placeholder="." onChange={e=>setCarries2(p=>{const n=[...p];n[i]=e.target.value.slice(-2);return n;})} /></div>)}
                        <div className="col-span-5 calc-line"></div>
                        <div className="col-span-1"></div>{inputs2.map((v, i) => <input key={`in2-${i}`} type="number" className="digit-input h-10" value={v} disabled={digitsFinal[i]===' '} onChange={e => {setInputs2(p=>{const n=[...p];n[i]=e.target.value.slice(-1);return n;}); setErrorMsg('');}} />)}
                    </div>
                    {errorMsg && <div className="mt-3 text-center text-rose-500 font-bold text-sm bg-rose-50 p-2 rounded">{errorMsg}</div>}
                    <button onClick={checkAnswer} className="mt-5 w-full bg-indigo-600 text-white py-3 rounded-xl font-black shadow-md active:scale-95 transition-all hover:bg-indigo-700">檢查全式</button>
                </div>
            );
        };

        const VerticalMulti = ({ n1, n2, onComplete }) => {
            const digits1 = n1.toString().split(''); 
            const ansLength = (n1 * n2).toString().length;
            const gridCols = Math.max(5, digits1.length + 1); 
            
            const [inputs, setInputs] = useState(Array(ansLength).fill('')); 
            const [carries, setCarries] = useState(Array(digits1.length).fill(''));
            const [userOp, setUserOp] = useState('?');
            const [errorMsg, setErrorMsg] = useState('');
            const correctAns = n1 * n2;
            const correctDigits = correctAns.toString().split('');

            const checkAnswer = () => {
                if (userOp !== '×') { setErrorMsg('請選擇正確的計算符號！(應該是乘法喔)'); return; }
                let userNumStr = inputs.map(d => d === '' ? ' ' : d).join('');
                if (parseInt(userNumStr.replace(/\s/g, '')) === correctAns) onComplete(correctAns);
                else setErrorMsg('答案有錯喔！請重新檢查你的計算。');
            };

            return (
                <div className="bg-white p-6 rounded-2xl border-2 border-slate-200 shadow-sm max-w-md mx-auto animate-in zoom-in-95 overflow-x-auto">
                    <div className="grid gap-2 font-mono items-center justify-end" style={{ gridTemplateColumns: `repeat(${gridCols}, minmax(40px, 1fr))` }}>
                        <div style={{gridColumn: `span ${gridCols - digits1.length}`}}></div>
                        {carries.map((v, i) => <input key={`c-${i}`} className="carry-input" placeholder="進" value={v} onChange={e=>setCarries(p=>{const n=[...p];n[i]=e.target.value.slice(-1);return n;})} />)}
                        
                        <div style={{gridColumn: `span ${gridCols - digits1.length}`}}></div>
                        {digits1.map((d, i) => <div key={`d1-${i}`} className="h-10 flex items-center justify-center text-3xl font-black text-slate-700">{d}</div>)}
                        
                        <select value={userOp} onChange={e=>{setUserOp(e.target.value); setErrorMsg('');}} className="op-select text-3xl font-black text-blue-600 bg-blue-50 border-2 border-blue-200 rounded-lg outline-none">
                            <option value="?">?</option><option value="+">+</option><option value="-">-</option><option value="×">×</option>
                        </select>
                        <div style={{gridColumn: `span ${gridCols - 2}`}}></div>
                        <div className="h-10 flex items-center justify-center text-3xl font-black text-slate-700">{n2}</div>
                        
                        <div className="calc-line" style={{gridColumn: `span ${gridCols}`}}></div>
                        
                        <div style={{gridColumn: `span ${gridCols - ansLength}`}}></div>
                        {inputs.map((v, i) => <input key={`in-${i}`} type="number" className="digit-input h-14" value={v} disabled={correctDigits[i]===' '} placeholder={correctDigits[i]===' '?'':'?'} onChange={e => {setInputs(p=>{const n=[...p];n[i]=e.target.value.slice(-1);return n;}); setErrorMsg('');}} />)}
                    </div>
                    {errorMsg && <div className="mt-3 text-center text-rose-500 font-bold text-sm bg-rose-50 p-2 rounded">{errorMsg}</div>}
                    <button onClick={checkAnswer} className="mt-5 w-full bg-indigo-600 text-white py-3 rounded-xl font-black shadow-md active:scale-95 transition-all hover:bg-indigo-700">檢查答案</button>
                </div>
            );
        };

        // --- 全新加入：直式除法填空組件 ---

                let allCorrect = true;
                for (let key of blanks) {

                // Q19: 容量代入邏輯 (重寫語法)
                (() => {

                (() => {

                // Q21-Q22: 隨機幾何
                (() => {
                    const props = [
                        {q: '所有平行四邊形都有甚麼必定成立的特性？', a: '對邊長度相等', o: ['四邊長度都相等', '都是正方形', '有 3 個直角']},
                        {q: '梯形有甚麼獨特的特徵？', a: '只有一組對邊平行', o: ['所有梯形都沒有直角', '有一對長度相等的對邊', '都是平行四邊形']},
                        {q: '長方形有甚麼必定成立的特性？', a: '有 4 個直角', o: ['四邊長度相等', '只有一組對邊平行', '沒有平行線']},

                        { type: 'INPUT_CHECK', label: '總共最多可數出幾個平行四邊形？', correct: t.max.toString(), hint: '把所有不同大小的組合都加起來' }
                    ]};
                })(),

                (() => {

                    let total = swim + comp + paint + calli + dance;

                        {type:'LOGIC', text: 'Step 1: 媽媽比表姐少，即表姐較多。綜合算式是？', options: shuffle([`${dad} - (${mom} + ${diff})`, `${dad} - ${mom} + ${diff}`, `(${dad} - ${mom}) - ${diff}`, `${dad} + ${mom} - ${diff}`]), ans: `${dad} - (${mom} + ${diff})`},

                // 全新加入: Q26 除法直式 (由您的要求整合進來)
                (() => {

                        let div_o = dividend % 10;
                        let q_t = Math.floor(quotient / 10);
                        let q_o = quotient % 10;

                        let p1 = divisor * q_t;
                        let firstPart = (dividend >= 100) ? (div_h * 10 + div_t) : div_t;
                        if (firstPart < p1) continue; // 確保對齊符合標準直式

                        let rem1 = firstPart - p1;
                        let bd = div_o;

                        let p2 = divisor * q_o;

                        if (dividend > 99 && p1 < 10) allKeys = allKeys.filter(k => k !== 'p1_h');
                        if (p2 < 10) allKeys = allKeys.filter(k => k !== 'p2_t');

                        blanks = shuffle(allKeys).slice(0, rand(3, 5)); // 隨機挖空 3~5 格
                        validPuzzle = true;
                    }

                setQuestions(generateQuizData());
                setQIndex(0); setStepIndex(0); setMistakeList([]); setTimer(0); setMode('GAME');

                const newQs = generateQuizData();
                const targetQIndex = newQs.findIndex(q => q.id === parseInt(targetId));
                if(targetQIndex > -1){
                    const targetQ = newQs.splice(targetQIndex, 1)[0];
                    newQs.unshift(targetQ); 
                }
                setQuestions(newQs);
                setQIndex(0); setStepIndex(0); setMistakeList([]); setTimer(0); setMode('GAME');
            }

            const currentQ = questions[qIndex] || {};
            const currentStep = currentQ.steps ? currentQ.steps[stepIndex] : {};
            const progress = questions.length > 0 ? ((qIndex) / questions.length) * 100 : 0;

            useEffect(() => {
                if (mode === 'GAME') {
                    timerRef.current = setInterval(() => setTimer(t => t + 1), 1000);
                } else clearInterval(timerRef.current);
                return () => clearInterval(timerRef.current);
            }, [mode]);

            useEffect(() => {
                if (mode === 'GAME' && currentStep.type === 'CLOCK_INTERACTIVE') {
                    setClockState({ h: currentStep.startH || 12, m: currentStep.startM || 0 });
                }
                setShowHint(false);

            const showPraiseText = () => {
                setPraise(PRAISE_WORDS[Math.floor(Math.random() * PRAISE_WORDS.length)]);

                setMistakeList(prev => [...prev, { qId: currentQ.id, title: currentQ.title, correctText: currentQ.text, errorDetail: detail }]);
            };

            };

            const handleCalcComplete = (val) => { showPraiseText(); nextStep(); };

            const handleInputCheck = (val) => {

                else { markMistake(`填寫錯誤：填了 ${val} (正確: ${currentStep.correct})`); alert(`答案不對喔！`); }
            };
            
            const handleTextInputCheck = (val, correctAns) => {
                const normalizedVal = val.replace(/〇/g, '零').replace(/\s+/g, '');
                const normalizedCorrect = correctAns.replace(/〇/g, '零').replace(/\s+/g, '');

                if (normalizedVal === normalizedCorrect) {
                    showPraiseText();
                    nextStep();
                } else {
                    markMistake(`中文字寫錯：寫了「${val}」 (正確:「${correctAns}」)`);

            };

                let targetH = currentStep.targetH, h = clockState.h, m = clockState.m, isCorrect = false;

                                <button onClick={() => jumpToQuestion(22)} className="px-3 py-1 bg-slate-200 rounded text-xs font-bold hover:bg-slate-300">隨機平行四邊形 (Q22)</button>
                            </div>

                const uniqueMistakes = mistakeList.filter((v,i,a)=>a.findIndex(t=>(t.qId===v.qId))===i);
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-[2.5rem] p-10 max-w-lg w-full shadow-2xl text-center border border-slate-100 animate-in zoom-in-95">
                            <h2 className="text-4xl font-black text-slate-800 mb-6">特訓結束！</h2>
                            {uniqueMistakes.length === 0 ? (
                                <div className="bg-green-50 p-8 rounded-3xl text-green-700 font-bold mb-8 border border-green-200">太棒了！這次全對！</div>
                            ) : (
                                <div className="text-left bg-rose-50 p-6 rounded-3xl mb-8 border border-rose-100 max-h-60 overflow-y-auto custom-scrollbar">
                                    <h3 className="font-bold text-rose-600 mb-4">⚠️ 錯誤回顧：</h3>
                                    {uniqueMistakes.map((m, i) => (
                                        <div key={i} className="mb-4 border-b border-rose-200 pb-3 last:border-0">
                                            <div className="font-black text-slate-800">{m.title}</div>
                                            <div className="text-xs text-slate-500 mb-1">{m.correctText}</div>
                                            <div className="text-sm font-bold text-rose-500 bg-white px-2 py-1 rounded inline-block mt-1">{m.errorDetail}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            <button onClick={startQuiz} className="w-full bg-slate-800 text-white text-xl font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all">再來一次 (新題目)</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-2xl mx-auto relative overflow-hidden">
                    {praise && (
                        <div className="fixed top-12 left-1/2 z-50 pointer-events-none toast-anim">
                            <div className="bg-emerald-500 text-white px-8 py-3 rounded-full text-2xl font-black shadow-2xl border-4 border-white flex items-center gap-3">
                                <Icon.Check /> {praise}
                            </div>
                        </div>
                    )}
                    
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3 px-5 py-3 bg-white rounded-2xl font-bold text-slate-600 shadow-sm border border-slate-100"><span>Q {qIndex + 1} / {questions.length}</span></div>
                        <div className="flex items-center gap-2">
                            {devMode && (
                                <button onClick={forceSkipQuestion} className="flex items-center gap-1 px-3 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs shadow-sm hover:bg-slate-700 active:scale-95 transition-all">
                                    <Icon.FastForward /> 跳過
                                </button>
                            )}
                            <div className="flex items-center gap-3 px-5 py-3 bg-white rounded-2xl font-bold text-indigo-600 shadow-sm border border-slate-100"><Icon.Clock/> <span>{Math.floor(timer/60)}:{timer%60 < 10 ? '0'+timer%60 : timer%60}</span></div>
                        </div>
                    </div>
                    
                    <div className="w-full bg-slate-200 h-2 rounded-full mb-6 overflow-hidden"><div className="bg-indigo-500 h-full transition-all duration-500" style={{width: `${progress}%`}}></div></div>
                    
                    <div className="bg-white rounded-[2.5rem] shadow-xl border border-slate-200 overflow-hidden relative flex flex-col">
                        <div className="bg-slate-50 p-8 border-b border-slate-100 text-center relative flex-shrink-0">
                            <div className="inline-block px-3 py-1 rounded-full bg-indigo-100 text-indigo-600 text-xs font-black uppercase tracking-widest mb-3">{currentQ.title}</div>
                            <h2 className="text-3xl font-black text-slate-800 leading-snug whitespace-pre-wrap">{currentQ.text}</h2>
                            
                            {/* 特殊圖形組件 */}
                            {currentQ.isBeaker && <BeakerView capacity={currentQ.cap} level={currentQ.lvl} label="量杯" />}
                            {currentQ.isMultiBeaker && <div className="flex justify-center flex-wrap">{currentQ.beakers.map((b,i)=><BeakerView key={i} capacity={b.cap} level={b.lvl} label={b.label} />)}</div>}
                            {currentQ.isThreeBeakers && <ThreeBeakersView labels={currentQ.beakersData} />}
                            {currentQ.isAbacus && <AbacusView number={currentQ.val} />}
                            {currentQ.isPictogram && <PictogramView data={currentQ.data} title="3E班興趣班統計" />}
                            {currentQ.isGrid && (
                                <div className="flex justify-center my-6" dangerouslySetInnerHTML={{ __html: `<svg viewBox="0 0 200 120" class="w-48">${currentQ.gridPath}</svg>` }} />
                            )}
                            {currentQ.isCapacitySub && <CapacitySubView subLogic={currentQ.subLogic} />}
                        </div>
                        
                        <div className="p-8 flex-1 flex flex-col justify-center items-center w-full overflow-x-hidden">
                            <div className="text-center text-xs font-bold text-slate-400 mb-6 uppercase tracking-widest mb-2">Step {stepIndex + 1} of {currentQ.steps.length}</div>
                            {renderStep()}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
